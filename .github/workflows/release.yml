name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the artifact (e.g. 1.0.0). Used when not building a tag."
        required: false
        default: "dev"

permissions:
  contents: write

jobs:
  meta:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - id: version
        env:
          VERSION_INPUT: ${{ github.event.inputs.version }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${VERSION_INPUT:-dev}"
          fi
          VERSION="${VERSION//[^a-zA-Z0-9._-]/}"
          VERSION="${VERSION:-dev}"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

  macos:
    name: Build macOS DMG
    runs-on: macos-14
    needs: meta

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Build Release
        run: |
          set -euo pipefail
          xcodebuild \
            -project src/macos/PingStats.xcodeproj \
            -scheme PingStats \
            -configuration Release \
            -derivedDataPath .build \
            -destination "platform=macOS,arch=arm64" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

          APP_PATH=".build/Build/Products/Release/PingStats.app"
          test -d "${APP_PATH}"
          test -f "${APP_PATH}/Contents/Resources/AppIcon.icns" \
            || ls -la "${APP_PATH}/Contents/Resources/"
          echo "APP_PATH=${APP_PATH}" >> "$GITHUB_ENV"

      - name: Install create-dmg
        run: |
          set -euo pipefail
          brew untap aws/tap 2>/dev/null || true
          brew install create-dmg

      - name: Create DMG
        run: |
          set -euo pipefail
          chmod +x scripts/create-dmg.sh
          mkdir -p dist
          ./scripts/create-dmg.sh "${APP_PATH}" "dist/PingStats-${{ needs.meta.outputs.version }}.dmg"
          cp "dist/PingStats-${{ needs.meta.outputs.version }}.dmg" dist/PingStats.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v6
        with:
          name: PingStats-${{ needs.meta.outputs.version }}-macos
          path: |
            dist/PingStats-${{ needs.meta.outputs.version }}.dmg
            dist/PingStats.dmg

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/PingStats-${{ needs.meta.outputs.version }}.dmg
            dist/PingStats.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows:
    name: Build Windows
    runs-on: windows-latest
    needs: meta

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup .NET
          uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.x

      - name: Restore
        run: dotnet restore src/windows/PingStats.Windows/PingStats.Windows.csproj -r win-x64

      - name: Publish Release
        run: |
          dotnet publish src/windows/PingStats.Windows/PingStats.Windows.csproj `
            -c Release `
            --no-restore `
            -r win-x64 `
            --self-contained `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:PublishSingleFile=true `
            -p:PublishTrimmed=true `
            -p:DebugType=None -p:DebugSymbols=false `
            -o publish/PingStats

      - name: Zip artifact
        run: |
          Compress-Archive -Path publish/PingStats/* -DestinationPath "PingStats-${{ needs.meta.outputs.version }}-windows.zip"
          Copy-Item "PingStats-${{ needs.meta.outputs.version }}-windows.zip" PingStats-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: PingStats-${{ needs.meta.outputs.version }}-windows
          path: |
            PingStats-${{ needs.meta.outputs.version }}-windows.zip
            PingStats-windows.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            PingStats-${{ needs.meta.outputs.version }}-windows.zip
            PingStats-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
