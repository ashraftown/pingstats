name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  macos:
    name: Build macOS
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Build Release
        run: |
          set -euo pipefail
          xcodebuild \
            -project src/macos/PingStats.xcodeproj \
            -scheme PingStats \
            -configuration Release \
            -derivedDataPath .build \
            -destination "platform=macOS,arch=arm64" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

          APP_PATH=".build/Build/Products/Release/PingStats.app"
          test -d "${APP_PATH}"
          test -f "${APP_PATH}/Contents/Resources/AppIcon.icns" \
            || ls -la "${APP_PATH}/Contents/Resources/"

  windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Restore
        run: dotnet restore src/windows/PingStats.Windows/PingStats.Windows.csproj

      - name: Build Release
        run: dotnet build src/windows/PingStats.Windows/PingStats.Windows.csproj -c Release --no-restore
